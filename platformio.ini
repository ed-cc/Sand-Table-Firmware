; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Only build the Arduino environment by default (native is for testing only)
default_envs = megaatmega2560

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
upload_protocol = wiring
upload_speed = 115200
; Uncomment to enable debug serial prints for motion diagnostics
; build_flags = -D DEBUG
lib_deps =
    teemuatlut/TMCStepper @ ^0.7.3

[env:native]
platform = native
build_flags =
    -I test
    -I include
    -std=c++11
    -D UNIT_TEST
# Only build source files that don't depend on Arduino hardware libraries
# Exclude: main.cpp (has main/setup/loop), motion.cpp (TMC dependencies), motion_commander.cpp (needs motion.h with TMC)
build_src_filter =
    +<stepper_axis.cpp>
    +<theta_compensation.cpp>
    +<scurve_profile.cpp>
    +<bresenham_sync.cpp>
    +<coordinated_stepper.cpp>
    +<gcode_interpreter.cpp>
    +<planner_buffer.cpp>
    -<main.cpp>
    -<motion.cpp>
    -<motion_commander.cpp>
# Let the test framework auto-detect and build dependencies
test_build_src = yes
